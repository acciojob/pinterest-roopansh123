<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pinterest Hero Section</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #fff;
    }

    /* Hero Container */
    .hero {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 40px;
      gap: 40px;
    }

    /* Left Content */
    .hero-content {
      max-width: 500px;
    }

    .hero-content h1 {
      font-size: 48px;
      margin-bottom: 20px;
      color: #111;
    }

    .hero-content p {
      font-size: 18px;
      margin-bottom: 25px;
      color: #555;
    }

    /* Button */
    .hero-content a {
      text-decoration: none;
      padding: 12px 24px;
      background-color: #e60023;
      color: white;
      border-radius: 25px;
      font-weight: bold;
      display: inline-block;
    }

    /* Image */
    .hero-image img {
      width: 400px;
      height: 500px;
      object-fit: cover;
      border-radius: 20px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-image img {
        width: 100%;
        height: 300px;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    
    <!-- Text Content -->
    <div class="hero-content">
      <h1>Get your next idea</h1>
      <p>Discover recipes, home ideas, style inspiration and more.</p>
      <a href="#">Explore now</a>
    </div>

    <!-- Image -->
    <div class="hero-image">
      <img src="https://images.pexels.com/photos/2662116/pexels-photo-2662116.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1">
    </div>

  </div>

</body>
</html>
